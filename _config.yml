title: Shri's Technical Blog
description: >
  Systems engineer working across the stack: hardware-level acquisition, signal processing, and edge inference for real-time biomedical systems.
url: "https://stpr-dev.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: catppuccin_mocha

author:
  name: Shri
  # MM supports more author fields if you want them later:
  # bio: "Systems engineer working across the stack."
  # links:
  #   - label: "GitHub"
  #     icon: "fab fa-fw fa-github"
  #     url: "https://github.com/stpr-dev"

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

permalink: /:categories/:year/:month/:day/:title/

show_excerpts: true
