<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    color: #e0e0e0;
    padding: 24px;

  h1 {

    gap: 24px;

    color: #888;

    padding: 7px 12px;

    font-size: 0.9rem;
    cursor: pointer;
    min-width: 160px;

  #plot {
    width: 100%;
    height: 520px;
    border-radius: 8px;
    overflow: hidden;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  .stats-card {
    background: #1e2130;
    border: 1px solid #2a2d3e;
    border-radius: 8px;
    padding: 14px 18px;
  }

  .stats-card h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .stats-card.linux  h3 { color: #f7c948; }
  .stats-card.windows h3 { color: #58a6ff; }
  .stats-card.nodata  h3 { color: #666; }

  .stats-card.nodata { opacity: 0.5; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    padding: 3px 0;
    border-bottom: 1px solid #2a2d3e;
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: #888; }
  .stat-value { color: #e0e0e0; font-variant-numeric: tabular-nums; }

  .zero-note {
    font-size: 0.78rem;
    color: #888;
    margin-top: 8px;
    font-style: italic;
  }
</style>

const OS_META = {
  "Linux"  : { color: "#f7c948", dash: "solid"  },
  "Windows": { color: "#58a6ff", dash: "dot"    },
};

const selPc = document.getElementById("sel-pc");
const selFs = document.getElementById("sel-fs");

// Populate PC dropdown (fixed list)
DATA.pcs.forEach(pc => {
  const o = document.createElement("option");
  o.value = o.textContent = pc;
  selPc.appendChild(o);
});

function getAvailableFrameSizes(pc) {
  return DATA.frame_sizes.filter(fs =>
    DATA.oses.some(os => (`${pc}|${os}|${fs}`) in DATA.conditions)
  );
}

function populateFrameSizes(pc) {
  const current = selFs.value;
  selFs.innerHTML = "";
  const available = getAvailableFrameSizes(pc);
  available.forEach(fs => {
    const o = document.createElement("option");
    o.value = fs;
    o.textContent = `${fs} bytes`;
    selFs.appendChild(o);
  });
  // Restore previous selection if still valid
  if (available.map(String).includes(current)) selFs.value = current;
}

function fmtNs(ns) {
  if (ns === null || ns === undefined) return "—";
  if (ns < 1e3)  return `${ns.toFixed(0)} ns`;
  if (ns < 1e6)  return `${(ns / 1e3).toFixed(2)} µs`;
  if (ns < 1e9)  return `${(ns / 1e6).toFixed(2)} ms`;
  return `${(ns / 1e9).toFixed(3)} s`;
}

function buildStatsCard(cardEl, os, cond) {
  cardEl.innerHTML = "";

  const heading = document.createElement("h3");

  if (!cond) {
    cardEl.classList.add("nodata");
    cardEl.classList.remove("linux", "windows");
    cardEl.classList.add(os === "Linux" ? "linux" : "windows");
    heading.textContent = `${os} — no data`;
    cardEl.appendChild(heading);
    return;
  }

  cardEl.classList.remove("nodata");

  heading.textContent = os;
  cardEl.appendChild(heading);

  const rows = [
    ["Samples",   cond.n_samples.toLocaleString()],
    ["Min",       fmtNs(cond.min_ns)],
    ...Object.entries(cond.percentiles).map(([k, v]) => [
      `p${k.slice(1)}`, fmtNs(v)
    ]),
    ["Max",       fmtNs(cond.max_ns)],
  ];

  rows.forEach(([label, value]) => {
    const row = document.createElement("div");
    row.className = "stat-row";
    row.innerHTML = `<span class="stat-label">${label}</span><span class="stat-value">${value}</span>`;
    cardEl.appendChild(row);
  });

  if (cond.zero_fraction > 0) {
    const note = document.createElement("p");
    note.className = "zero-note";
    note.textContent =
      `${(cond.zero_fraction * 100).toFixed(2)}% of samples at or below timing resolution`;
    cardEl.appendChild(note);
  }
}

      xanchor : "right",
      yanchor : "bottom",
    })),
  };

  const config = {
    responsive     : true,
    displayModeBar : true,
    modeBarButtonsToRemove: ["select2d", "lasso2d"],
  };

  Plotly.react("plot", traces, layout, config);

  // Update stats cards
  DATA.oses.forEach(os => {
    const key    = `${pc}|${os}|${fs}`;
    const cond   = DATA.conditions[key] ?? null;
    const cardId = `card-${os.toLowerCase()}`;
    buildStatsCard(document.getElementById(cardId), os, cond);
  });
}

selPc.addEventListener("change", () => {
  populateFrameSizes(selPc.value);
  render();
});
selFs.addEventListener("change", render);

// Init
populateFrameSizes(selPc.value);
render();
</script>
</body>
</html>
